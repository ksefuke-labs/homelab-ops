talosVersion: v1.13.0
kubernetesVersion: v1.35.3

clusterName: Jotunn
endpoint: https://k8s.jotunn.internal:6443

nodes:
  - hostname: controller
    controlPlane: true
    ipAddress: 10.52.100.12
    ignoreHostname: true
    installDisk: /dev/sda

  - hostname: worker
    controlPlane: false
    ipAddress: 10.52.100.13, 10.52.100.14
    ignoreHostname: true
    installDisk: /dev/sda
  



# Global patches
patches:
  - "@./patches/misc/resolver-config.yaml"     # Internal Search Domain
  - "@./patches/misc/time-sync-config.yaml"   # OPNsense NTP servers


controlPlane:
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/newt
          - siderolabs/qemu-guest-agent
        

worker:
  schematic:
    customization:
      systemExtensions:
        officialExtensions:
          - siderolabs/iscsi-tools
          - siderolabs/newt
          - siderolabs/qemu-guest-agent
          - siderolabs/util-linux-tools
  
  patches:
  #- "@./patches/misc/intel-gpu.yaml" # Loads intel igpu kernel module
  - |-
        ---
        apiVersion: v1alpha1
        kind: UserVolumeConfig
        name: longhorn
        provisioning:
          diskSelector:
            match: "'/dev/disk/by-id/scsi-0QEMU_QEMU_HARDDISK_drive-scsi1' in disk.symlinks"
          grow: false
          minSize: 1GB
          maxSize: 100GB
        ---
        machine:
          kubelet:
            extraMounts:
              - destination: /var/mnt/longhorn
                type: bind
                source: /var/mnt/longhorn
                options:
                  - bind
                  - rshared
                  - rw