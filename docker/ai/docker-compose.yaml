services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=0.0.0.0          # Listen on all interfaces (default in Docker)
      - OLLAMA_NUM_PARALLEL=2        # Allow 2 concurrent requests
      - OLLAMA_MAX_LOADED_MODELS=2   # Keep 2 models in memory simultaneously
      - OLLAMA_KEEP_ALIVE=24h        # Keep model in memory 24 hours after last use
      - OLLAMA_CONTEXT_LENGTH=32000
      - OLLAMA_FLASH_ATTENTION=1
    devices:
      - /dev/kfd
      - /dev/dri
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama


  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    volumes:
      - ./open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
volumes:
  ollama_data:
  open_webui_data: